server {
    listen 80;

    location /videos/ {
        alias /usr/share/nginx/html/videos/;

        # Indispensable pour le seek dans le player navigateur
        add_header Accept-Ranges bytes;

        # CORS — permet à l'app Next.js de charger les vidéos
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";

        # Cache navigateur — les vidéos ne changent pas souvent
        add_header Cache-Control "public, max-age=86400";

        # Types MIME vidéo
        types {
            video/mp4   mp4;
            video/webm  webm;
            video/ogg   ogv;
        }
    }

    # Répondre aux preflight CORS
    location = /videos {
        return 301 /videos/;
    }
}
